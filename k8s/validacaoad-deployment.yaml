apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: validacaoad-servicemonitor
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: validacaoad
  namespaceSelector:
    matchNames:
      - producao
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
